[haproxy]
vm-haproxy ansible_host=192.168.50.11 ansible_user=vagrant ansible_ssh_private_key_file=/home/vagrant/.ssh/id_rsa ansible_ssh_common_args='-o StrictHostKeyChecking=no'

[microservices]
vm-microservices ansible_host=192.168.50.12 ansible_user=vagrant ansible_ssh_private_key_file=/home/vagrant/.ssh/id_rsa ansible_ssh_common_args='-o StrictHostKeyChecking=no'
